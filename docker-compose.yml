version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://api:5000
    depends_on:
      - api

  api:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/kanpur_lab
      - AUTH_SECRET=your-secure-secret-here
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=securepassword
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: