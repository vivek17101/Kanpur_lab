version: '3.8'

# IMPORTANT — before running docker-compose up:
#
#   1. Replace the AUTH_SECRET value below with a strong random string (64+ chars).
#      Generate one with:
#        node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
#
#   2. Replace ADMIN_PASSWORD with a strong password.
#
#   3. Never commit a real secret to version control.
#      Consider using a .env file (listed in .gitignore) and referencing it here:
#        AUTH_SECRET: ${AUTH_SECRET}
#
# The server will refuse to start if AUTH_SECRET matches the placeholder below,
# so you will get a clear error rather than a silently insecure deployment.

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://api:5000
    depends_on:
      - api

  api:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/kanpur_lab
      # CHANGE THIS before running. See note above.
      - AUTH_SECRET=REPLACE-THIS-WITH-A-REAL-64-CHAR-RANDOM-SECRET-DO-NOT-USE-AS-IS
      - ADMIN_USERNAME=admin
      # CHANGE THIS before running.
      - ADMIN_PASSWORD=REPLACE-WITH-STRONG-PASSWORD
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: